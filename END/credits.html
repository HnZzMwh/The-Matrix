<!DOCTYPE html>
<html lang="en" translate="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>// MATRIX END CREDITS //</title>
<meta name="google" content="notranslate">
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #000;
  font-family: 'Share Tech Mono', 'Courier New', monospace;
  cursor: none;
}

#rain-canvas {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 0;
  opacity: 0.38;
}

#credits-container {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  perspective: 400px;
}

#credits {
  position: absolute;
  width: 60%;
  max-width: 800px;
  text-align: center;
  transform-style: preserve-3d;
  opacity: 0;
  transition: opacity 0.01s;
}
#credits.scrolling {
  opacity: 1;
  animation: scrollUp 40s linear forwards;
}

.credit-line {
  font-family: 'Orbitron', 'Share Tech Mono', monospace;
  font-size: 22px;
  letter-spacing: 3px;
  padding: 18px 0;
  opacity: 0;
  animation: fadeInLine 0.8s ease forwards;
}

.credit-line:nth-child(odd) { color: #00ff41; }
.credit-line:nth-child(even) { color: #00cc33; }

.credit-line.flicker {
  animation: fadeInLine 0.8s ease forwards, flicker var(--flicker-dur, 2s) infinite;
}

@keyframes scrollUp {
  0% { transform: translateY(400vh); }
  100% { transform: translateY(-80vh); }
}

@keyframes fadeInLine {
  0% { opacity: 0; transform: translateY(10px); }
  100% { opacity: 1; transform: translateY(0); }
}

@keyframes flicker {
  0%, 100% { opacity: 1; text-shadow: 0 0 8px currentColor; }
  3% { opacity: 0.3; text-shadow: 0 0 2px currentColor; }
  6% { opacity: 1; text-shadow: 0 0 12px currentColor; }
  10% { opacity: 0.6; text-shadow: 0 0 4px currentColor; }
  12% { opacity: 1; text-shadow: 0 0 8px currentColor; }
  30% { opacity: 0.8; text-shadow: 0 0 6px currentColor; }
  32% { opacity: 1; text-shadow: 0 0 10px currentColor; }
  50% { opacity: 0.9; text-shadow: 0 0 7px currentColor; }
  52% { opacity: 1; text-shadow: 0 0 9px currentColor; }
  78% { opacity: 0.7; text-shadow: 0 0 3px currentColor; }
  80% { opacity: 1; text-shadow: 0 0 11px currentColor; }
}

.section-header {
  font-size: 14px;
  letter-spacing: 6px;
  color: #005500;
  padding: 40px 0 10px 0;
  text-transform: uppercase;
}

.section-header:first-child {
  padding-top: 80px;
}

.title-line {
  font-family: 'Orbitron', monospace;
  font-size: 36px;
  font-weight: 900;
  letter-spacing: 10px;
  color: #00ff41;
  padding: 60px 0 20px 0;
  text-shadow: 0 0 30px rgba(0,255,65,0.4);
}

.subtitle-line {
  font-size: 12px;
  letter-spacing: 4px;
  color: #006622;
  padding-bottom: 30px;
}

.final-line {
  font-family: 'Orbitron', monospace;
  font-size: 28px;
  font-weight: 700;
  letter-spacing: 8px;
  color: #00ff41;
  padding: 50px 0 80px 0;
  text-shadow: 0 0 20px rgba(0,255,65,0.3);
}
</style>
</head>
<body>

<canvas id="rain-canvas"></canvas>

<div id="credits-container">
  <div id="credits"></div>
</div>

<script>
// ─── Matrix rain ─────────────────────────────────────────────
const canvas = document.getElementById('rain-canvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const FONT_SIZE = 14;
let COLS = Math.floor(canvas.width / FONT_SIZE);
let drops = Array(COLS).fill(1);
const chars = 'アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン0123456789ABCDEF@#$%&';

function drawRain() {
  ctx.fillStyle = 'rgba(0,0,0,0.05)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.font = FONT_SIZE + 'px monospace';
  for (let i = 0; i < drops.length; i++) {
    const c = chars[Math.floor(Math.random() * chars.length)];
    const x = i * FONT_SIZE;
    const y = drops[i] * FONT_SIZE;
    ctx.fillStyle = y < canvas.height * 0.3 ? '#003300'
                 : y < canvas.height * 0.7 ? '#006600'
                 : '#00ff41';
    ctx.fillText(c, x, y);
    if (y > canvas.height && Math.random() > 0.975) drops[i] = 0;
    drops[i]++;
  }
}
setInterval(drawRain, 60);

window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  COLS = Math.floor(canvas.width / FONT_SIZE);
  drops = Array(COLS).fill(1);
});

// ─── Credits content ─────────────────────────────────────────
const technologies = [
  { type: 'title', text: '/ /   M A T R I X  / /' },
  { type: 'subtitle', text: 'TECHNOLOGY STACK' },
  { type: 'header', text: '// FRAMEWORKS & RUNTIMES //' },
  { type: 'item', text: 'Electron' },
  { type: 'item', text: 'Python' },
  { type: 'header', text: '// COMPUTER VISION //' },
  { type: 'item', text: 'MediaPipe FaceMesh' },
  { type: 'item', text: 'WebRTC / navigator.mediaDevices' },
  { type: 'header', text: '// BACKEND & AGENT //' },
  { type: 'item', text: 'FastAPI' },
  { type: 'item', text: 'LangGraph' },
  { type: 'item', text: 'Python http.server' },
  { type: 'item', text: 'WebSocket' },
  { type: 'header', text: '// LLM PROVIDERS //' },
  { type: 'item', text: 'Ollama' },
  { type: 'item', text: 'Alibaba Cloud Bailian (DashScope) API' },
  { type: 'item', text: 'Google Gemini API' },
  { type: 'item', text: 'OpenAI API' },
  { type: 'item', text: 'Anthropic Claude API' },
  { type: 'header', text: '// FRONTEND //' },
  { type: 'item', text: 'HTML5 Canvas' },
  { type: 'item', text: 'CSS3' },
  { type: 'item', text: 'V8' },
  { type: 'item', text: 'WebAssembly (WASM)' },
  { type: 'item', text: 'WebGL' },
  { type: 'item', text: 'requestAnimationFrame' },
  { type: 'header', text: '// STORAGE & DATA //' },
  { type: 'item', text: 'localStorage' },
  { type: 'item', text: 'JSON' },
  { type: 'header', text: '// ELECTRON //' },
  { type: 'item', text: 'child_process.spawn' },
  { type: 'item', text: 'Electron IPC' },
  { type: 'item', text: 'preload.js context bridge' },
  { type: 'header', text: '// SECURITY & PERFORMANCE //' },
  { type: 'item', text: 'CSP' },
  { type: 'item', text: 'AbortController' },
  { type: 'header', text: '// PATTERNS & EFFECTS //' },
  { type: 'item', text: 'RegExp' },
  { type: 'item', text: 'Task DAG' },
  { type: 'item', text: 'Typewriter effect' },
  { type: 'item', text: 'Orbitron / Share Tech Mono fonts' },
  { type: 'header', text: '// DEPLOYMENT //' },
  { type: 'item', text: 'PowerShell' },
  { type: 'item', text: 'Chrome fullscreen mode' },
  { type: 'final', text: '/ /   R E D   P I L L  / /' },
];

const creditsEl = document.getElementById('credits');

technologies.forEach((t, i) => {
  const div = document.createElement('div');

  if (t.type === 'title') {
    div.className = 'title-line';
    div.textContent = t.text;
  } else if (t.type === 'subtitle') {
    div.className = 'subtitle-line';
    div.textContent = t.text;
  } else if (t.type === 'header') {
    div.className = 'section-header';
    div.textContent = t.text;
  } else if (t.type === 'item') {
    div.className = 'credit-line flicker';
    div.textContent = t.text;
    div.style.setProperty('--flicker-dur', (1.5 + Math.random() * 2.5).toFixed(1) + 's');
    div.style.animationDelay = (i * 0.15) + 's';
  } else if (t.type === 'final') {
    div.className = 'final-line';
    div.textContent = t.text;
  }

  creditsEl.appendChild(div);
});

// ─── Click to restart or fullscreen ──────────────────────────
document.addEventListener('click', () => {
  if (document.fullscreenElement) {
    document.exitFullscreen();
  } else {
    document.documentElement.requestFullscreen().catch(() => {});
  }
});

// ─── Start credits after 3s delay ────────────────────────────
setTimeout(() => {
  document.getElementById('credits').classList.add('scrolling');
}, 3000);

// ─── Space: restart credits from bottom, rain unaffected ────
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') {
    e.preventDefault();
    const el = document.getElementById('credits');
    el.style.animation = 'none';
    void el.offsetHeight;
    el.style.animation = '';
  }
});

// Auto fullscreen after 0.5s
setTimeout(() => {
  document.documentElement.requestFullscreen().catch(() => {});
}, 500);
</script>
</body>
</html>
